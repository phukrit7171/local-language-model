services:
  local-language-model:
    image: ghcr.io/ggml-org/llama.cpp:full-cuda13
    environment:
      - LD_LIBRARY_PATH=/usr/lib64
    devices:
      - nvidia.com/gpu=all
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro,Z
    command:
      [
        "-s",
        "-m",
        "/models/Qwopus3.5-9B-v3.Q4_K_M.gguf",
        "--cache-type-k",
        "q8_0",
        "--cache-type-v",
        "q4_0",
        "-fa",
        "on",
        "-c",
        "32000",
        "-ngl",
        "999",
        "--port",
        "8080",
        "--host",
        "0.0.0.0",
      ]
